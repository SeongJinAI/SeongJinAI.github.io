baseURL = "https://SeongJinAI.github.io/"
title = "AI Automation Architecture"
theme = "Stack"
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = true
[pagination]
  pagerSize = 10
hasCJKLanguage = true

[params]
  mainSections = ["posts"]
  favicon = "/favicon.ico"
  description = "AI를 활용한 업무 자동화 아키텍처 설계 포트폴리오"

  [params.footer]
    since = 2026

  [params.dateFormat]
    published = "2006.01.02"
    lastUpdated = "2006.01.02"

  [params.sidebar]
    emoji = ""
    subtitle = "AI Systems Architect"

  [params.article]
    math = false
    toc = false
    readingTime = true

  [params.comments]
    enabled = false

  [[params.widgets.homepage]]
    type = "search"
  [[params.widgets.homepage]]
    type = "categories"
  [[params.widgets.homepage]]
    type = "tag-cloud"

[languages]
  [languages.ko]
    languageName = "한국어"
    weight = 1
    title = "AI 자동화 아키텍처"
    contentDir = "content/ko"
    [languages.ko.params]
      description = "AI를 활용한 업무 자동화 아키텍처 설계 포트폴리오"
      [languages.ko.params.sidebar]
        emoji = ""
        subtitle = "AI 시스템 아키텍트"
    [[languages.ko.menu.main]]
      name = "홈"
      url = "/ko/"
      weight = 1
      [languages.ko.menu.main.params]
        icon = "home"
    [[languages.ko.menu.main]]
      name = "아키텍처"
      url = "/ko/posts/"
      weight = 2
      [languages.ko.menu.main.params]
        icon = "archives"
    [[languages.ko.menu.main]]
      name = "태그"
      url = "/ko/tags/"
      weight = 3
      [languages.ko.menu.main.params]
        icon = "tag"
    [[languages.ko.menu.main]]
      name = "English"
      url = "/en/"
      weight = 4
      [languages.ko.menu.main.params]
        icon = "language"

  [languages.en]
    languageName = "English"
    weight = 2
    title = "AI Automation Architecture"
    contentDir = "content/en"
    [languages.en.params]
      description = "Portfolio of AI-powered workflow automation architecture design"
      [languages.en.params.sidebar]
        emoji = ""
        subtitle = "AI Systems Architect"
    [[languages.en.menu.main]]
      name = "Home"
      url = "/en/"
      weight = 1
      [languages.en.menu.main.params]
        icon = "home"
    [[languages.en.menu.main]]
      name = "Architecture"
      url = "/en/posts/"
      weight = 2
      [languages.en.menu.main.params]
        icon = "archives"
    [[languages.en.menu.main]]
      name = "Tags"
      url = "/en/tags/"
      weight = 3
      [languages.en.menu.main.params]
        icon = "tag"
    [[languages.en.menu.main]]
      name = "한국어"
      url = "/ko/"
      weight = 4
      [languages.en.menu.main.params]
        icon = "language"

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true

[related]
  includeNewer = true
  threshold = 60
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 200
